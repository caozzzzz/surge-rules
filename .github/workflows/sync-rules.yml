name: Sync Surge rules

on:
  workflow_dispatch:
  schedule:
    # 22:20 UTC = 06:20 Asia/Shanghai
    - cron: "20 22 * * *"

permissions:
  contents: write

concurrency:
  group: sync-surge-rules
  cancel-in-progress: true

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Download upstream Surge rules
        shell: bash
        run: |
          set -euo pipefail

          download() {
            local url="$1"
            local output="$2"
            local temporary="${output}.tmp"
            curl --fail --location --retry 3 --retry-all-errors \
              --connect-timeout 15 --max-time 180 \
              "$url" --output "$temporary"
            test -s "$temporary"
            mv "$temporary" "$output"
          }

          download "https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Surge/Netflix/Netflix.list" "rules/netflix.list"
          download "https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Surge/Telegram/Telegram.list" "rules/telegram.list"
          download "https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Surge/Twitter/Twitter.list" "rules/twitter.list"
          download "https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Surge/TikTok/TikTok.list" "rules/tiktok.list"
          download "https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Surge/ChinaMax/ChinaMax_No_IPv6.list" "rules/china.list"

      - name: Validate Surge rule format
        run: python scripts/validate_rules.py

      - name: Commit updates
        shell: bash
        run: |
          if git diff --quiet -- rules; then
            echo "Rules are already current."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add rules
          git commit -m "chore: sync Surge rules"
          git push
